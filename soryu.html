<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>龍神霊視・オーラ鑑定</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Zen+Antique+Soft&family=Hina+Mincho&display=swap" rel="stylesheet">
<style>
  :root {
    --black:   #09080d;
    --deep:    #0d0b14;
    --gold:    #c8942a;
    --gold2:   #f0c050;
    --red:     #8b1a1a;
    --red2:    #cc2200;
    --washi:   #f2ead8;
    --ash:     #7a7068;
    --smoke:   rgba(200,148,42,0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width: 100%; min-height: 100vh;
    background: var(--black);
    overflow-x: hidden;
    font-family: 'Kaisei Decol', 'Zen Antique Soft', 'Hina Mincho', serif;
    color: var(--washi);
  }

  /* ========= DRAGON CANVAS ========= */
  #bgCanvas {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ========= LAYOUT ========= */
  .wrap {
    position: relative; z-index: 1;
    max-width: 460px;
    margin: 0 auto;
    padding: 0 22px 80px;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }

  /* ========= HEADER ========= */
  .header {
    text-align: center;
    padding-top: 52px;
    margin-bottom: 10px;
    animation: descend 1.4s cubic-bezier(.2,.8,.3,1) both;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: .7em;
    color: var(--gold);
    opacity: .7;
    margin-bottom: 16px;
    text-indent: .7em;
  }

  .title-main {
    font-family: 'Zen Antique Soft', serif;
    font-size: clamp(36px, 9vw, 52px);
    letter-spacing: .25em;
    line-height: 1.1;
    background: linear-gradient(170deg, #fff9ec 0%, var(--gold2) 40%, var(--gold) 70%, #a06020 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 18px rgba(200,148,42,.45));
    margin-bottom: 6px;
  }

  .title-sub {
    font-family: 'Hina Mincho', serif;
    font-size: 13px;
    letter-spacing: .5em;
    color: rgba(242,234,216,.5);
    margin-bottom: 28px;
  }

  /* 龍の瞳 */
  .eye-wrap {
    width: 90px; height: 90px;
    margin: 0 auto 44px;
    position: relative;
    animation: eyePulse 4s ease-in-out infinite;
  }
  .eye-wrap svg { width: 100%; height: 100%; }

  /* ========= CARD ========= */
  .card {
    width: 100%;
    background: linear-gradient(160deg, rgba(255,255,255,.04) 0%, rgba(0,0,0,.4) 100%);
    border: 1px solid rgba(200,148,42,.25);
    border-radius: 2px;
    padding: 32px 26px 28px;
    position: relative;
    overflow: hidden;
    animation: ascend .9s .2s ease both;
  }
  .card::before {
    content:'';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(200,148,42,.07) 0%, transparent 70%);
    pointer-events: none;
  }
  /* 四隅の装飾 */
  .card::after {
    content:'';
    position: absolute;
    top:8px; left:8px; right:8px; bottom:8px;
    border: 1px solid rgba(200,148,42,.07);
    pointer-events: none;
  }

  .corner {
    position: absolute; width: 18px; height: 18px;
    border-color: var(--gold); border-style: solid; opacity: .45;
  }
  .c-tl { top:12px; left:12px; border-width:1px 0 0 1px; }
  .c-tr { top:12px; right:12px; border-width:1px 1px 0 0; }
  .c-bl { bottom:12px; left:12px; border-width:0 0 1px 1px; }
  .c-br { bottom:12px; right:12px; border-width:0 1px 1px 0; }

  /* ========= FORM ========= */
  .field { margin-bottom: 22px; }

  .field-label {
    display: block;
    font-family: 'Hina Mincho', serif;
    font-size: 11px;
    letter-spacing: .55em;
    color: var(--gold);
    opacity: .8;
    margin-bottom: 9px;
    text-indent: .55em;
  }

  .field-input {
    width: 100%;
    background: rgba(255,255,255,.03);
    border: none;
    border-bottom: 1px solid rgba(200,148,42,.3);
    color: var(--washi);
    font-family: 'Kaisei Decol', serif;
    font-size: 17px;
    letter-spacing: .1em;
    padding: 9px 4px 9px;
    outline: none;
    -webkit-appearance: none;
    transition: border-color .4s;
    caret-color: var(--gold2);
  }
  .field-input::placeholder { color: rgba(242,234,216,.2); font-size:14px; letter-spacing:.08em; }
  .field-input:focus { border-bottom-color: var(--gold2); }
  /* date picker 文字色 */
  .field-input[type=date]::-webkit-calendar-picker-indicator { filter: invert(.6) sepia(1) hue-rotate(10deg); }

  /* ========= BUTTON ========= */
  .btn-invoke {
    width: 100%; margin-top: 30px;
    padding: 19px 0;
    background: linear-gradient(135deg, rgba(139,26,26,.6) 0%, rgba(100,15,15,.8) 100%);
    border: 1px solid rgba(200,80,40,.5);
    color: var(--gold2);
    font-family: 'Zen Antique Soft', serif;
    font-size: 16px;
    letter-spacing: .6em;
    text-indent: .6em;
    cursor: pointer;
    position: relative; overflow: hidden;
    transition: all .35s;
    box-shadow: 0 0 28px rgba(180,40,20,.15), inset 0 1px 0 rgba(255,180,50,.1);
  }
  .btn-invoke::before {
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(200,148,42,.15), rgba(180,40,20,.1));
    transform: scaleX(0); transform-origin: left;
    transition: transform .4s;
  }
  .btn-invoke:hover::before { transform: scaleX(1); }
  .btn-invoke:hover { border-color: rgba(200,148,42,.7); letter-spacing:.65em; }
  .btn-invoke:disabled { opacity:.35; cursor:not-allowed; }
  .btn-invoke span { position:relative; z-index:1; }

  /* ========= LOADING ========= */
  .loading { display:none; text-align:center; padding:50px 0; animation:fadeIn .5s ease; }
  .loading.on { display:block; }

  .flame-loader {
    width:70px; height:70px; margin:0 auto 24px;
    position:relative;
  }
  .flame-loader::before, .flame-loader::after {
    content:'';
    position:absolute; border-radius:50%;
  }
  .flame-loader::before {
    inset:0;
    background: conic-gradient(var(--gold2), var(--red2), var(--gold), var(--red2), var(--gold2));
    animation: spinFlame 1.8s linear infinite;
    opacity:.7;
    filter: blur(4px);
  }
  .flame-loader::after {
    inset:14px;
    background: radial-gradient(circle, var(--gold2) 30%, var(--red) 100%);
    animation: pulseFire 1.2s ease-in-out infinite;
  }

  .loading-kanji {
    font-family: 'Zen Antique Soft', serif;
    font-size: 13px;
    letter-spacing: .6em;
    text-indent: .6em;
    color: rgba(200,148,42,.6);
    animation: breathe 2s ease-in-out infinite;
  }

  /* ========= RESULT ========= */
  .result { display:none; width:100%; animation: ascend .8s ease both; }
  .result.on { display:block; }

  .orb-row {
    display:flex; justify-content:center;
    margin-bottom: 28px;
  }

  .orb {
    width: 150px; height: 150px;
    border-radius: 50%;
    position: relative;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 0 60px var(--orb-glow, rgba(200,148,42,.3));
  }
  .orb::before {
    content:'';
    position:absolute; inset:-20px; border-radius:50%;
    background: radial-gradient(circle, var(--orb-glow, rgba(200,148,42,.2)) 0%, transparent 70%);
    animation: orbAura 3s ease-in-out infinite;
  }
  .orb::after {
    content:'';
    position:absolute; inset:0; border-radius:50%;
    background: radial-gradient(ellipse 40% 30% at 35% 30%, rgba(255,255,255,.25) 0%, transparent 60%);
  }
  .orb-inner {
    font-size: 48px;
    position: relative; z-index:2;
    filter: drop-shadow(0 0 8px rgba(255,255,255,.4));
    animation: floatIcon 3.5s ease-in-out infinite;
  }

  .r-name {
    text-align:center;
    font-family: 'Zen Antique Soft', serif;
    font-size: 26px;
    letter-spacing: .4em;
    color: var(--gold2);
    filter: drop-shadow(0 0 10px rgba(200,148,42,.5));
    margin-bottom: 4px;
  }
  .r-en {
    text-align:center;
    font-family: Georgia, serif;
    font-size:11px; letter-spacing:.4em; font-style:italic;
    color: rgba(200,148,42,.5);
    margin-bottom: 28px;
  }

  .r-divider {
    height:1px; width:100%;
    background: linear-gradient(to right, transparent, var(--gold) 30%, var(--red2) 50%, var(--gold) 70%, transparent);
    opacity:.35; margin-bottom:28px;
  }

  .r-msg {
    font-family: 'Kaisei Decol', serif;
    font-size: 15px;
    line-height: 2.15;
    letter-spacing: .07em;
    color: rgba(242,234,216,.88);
    text-align: justify;
    white-space: pre-wrap;
    border-left: 2px solid rgba(200,148,42,.2);
    padding-left: 18px;
    margin-bottom: 38px;
  }

  .btn-retry {
    width:100%; padding:13px;
    background:transparent;
    border:1px solid rgba(200,148,42,.18);
    color: rgba(200,148,42,.45);
    font-family:'Hina Mincho',serif;
    font-size:12px; letter-spacing:.5em; text-indent:.5em;
    cursor:pointer; transition:all .4s;
  }
  .btn-retry:hover { color:var(--gold); border-color:rgba(200,148,42,.5); }

  .foot {
    margin-top:40px; text-align:center;
    font-size:9px; letter-spacing:.3em;
    color: rgba(122,112,104,.3);
  }

  /* ========= KEYFRAMES ========= */
  @keyframes descend { from{opacity:0;transform:translateY(-28px)} to{opacity:1;transform:translateY(0)} }
  @keyframes ascend  { from{opacity:0;transform:translateY(22px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes eyePulse { 0%,100%{filter:drop-shadow(0 0 8px rgba(200,148,42,.5))} 50%{filter:drop-shadow(0 0 22px rgba(200,148,42,.9))} }
  @keyframes spinFlame { to{transform:rotate(360deg)} }
  @keyframes pulseFire { 0%,100%{transform:scale(1)} 50%{transform:scale(.85)} }
  @keyframes breathe { 0%,100%{opacity:.45} 50%{opacity:1} }
  @keyframes orbAura { 0%,100%{transform:scale(1);opacity:.55} 50%{transform:scale(1.12);opacity:.8} }
  @keyframes floatIcon { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
</style>
</head>
<body>

<!-- 龍の背景 -->
<canvas id="bgCanvas"></canvas>

<div class="wrap">

  <div class="header">
    <p class="eyebrow">— 龍 神 降 臨 —</p>
    <h1 class="title-main">霊　視</h1>
    <p class="title-sub">オーラカラー鑑定</p>
  </div>

  <!-- 龍の瞳 -->
  <div class="eye-wrap">
    <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="eyeGrad" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#f0c050"/>
          <stop offset="40%" stop-color="#c8942a"/>
          <stop offset="100%" stop-color="#3a1500"/>
        </radialGradient>
        <radialGradient id="pupilGrad" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#330000"/>
          <stop offset="100%" stop-color="#000"/>
        </radialGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- 外枠 -->
      <ellipse cx="45" cy="45" rx="42" ry="42" fill="none" stroke="rgba(200,148,42,.3)" stroke-width=".8"/>
      <ellipse cx="45" cy="45" rx="36" ry="36" fill="none" stroke="rgba(200,148,42,.15)" stroke-width=".5"/>
      <!-- 眼球 -->
      <ellipse cx="45" cy="45" rx="28" ry="18" fill="url(#eyeGrad)" filter="url(#glow)"/>
      <!-- 瞳孔（縦長） -->
      <ellipse cx="45" cy="45" rx="7" ry="16" fill="url(#pupilGrad)"/>
      <!-- ハイライト -->
      <ellipse cx="40" cy="38" rx="4" ry="2.5" fill="rgba(255,240,180,.45)"/>
      <!-- 鱗模様 -->
      <g fill="none" stroke="rgba(200,148,42,.22)" stroke-width=".6">
        <path d="M10,30 Q20,15 30,25"/>
        <path d="M60,25 Q70,15 80,30"/>
        <path d="M8,55 Q18,68 28,60"/>
        <path d="M62,60 Q72,68 82,55"/>
      </g>
    </svg>
  </div>

  <!-- フォームカード -->
  <div class="card" id="formCard">
    <div class="corner c-tl"></div><div class="corner c-tr"></div>
    <div class="corner c-bl"></div><div class="corner c-br"></div>

    <div id="formSection">
      <div class="field">
        <label class="field-label" for="nameInput">御　名　前</label>
        <input class="field-input" type="text" id="nameInput" placeholder="山田 花子" maxlength="20">
      </div>
      <div class="field">
        <label class="field-label" for="birthInput">生　年　月　日</label>
        <input class="field-input" type="date" id="birthInput">
      </div>
      <div class="field">
        <label class="field-label" for="concernInput">今、心に宿る想い（任意）</label>
        <input class="field-input" type="text" id="concernInput" placeholder="恋愛・仕事・人間関係など" maxlength="50">
      </div>
      <button class="btn-invoke" id="divineBtn" onclick="startDivination()">
        <span>✦　龍　神　に　問　う　✦</span>
      </button>
    </div>

    <!-- ローディング -->
    <div class="loading" id="loadingSection">
      <div class="flame-loader"></div>
      <p class="loading-kanji">龍　神　霊　視　中</p>
    </div>

    <!-- 結果 -->
    <div class="result" id="resultSection">
      <div class="orb-row">
        <div class="orb" id="auraOrb" style="--orb-glow:rgba(200,148,42,.3)">
          <span class="orb-inner" id="orbIcon">✦</span>
        </div>
      </div>
      <p class="r-name" id="colorName"></p>
      <p class="r-en" id="colorEn"></p>
      <div class="r-divider"></div>
      <p class="r-msg" id="resultMsg"></p>
      <button class="btn-retry" onclick="reset()">— 再び龍神に問う —</button>
    </div>

  </div>
  <p class="foot">霊視鑑定はエンターテインメントです</p>
</div>

<!-- ========= DRAGON CANVAS SCRIPT ========= -->
<script>
(function(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, t = 0;

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- 龍の体（ベジェ曲線の連なり） ----
  const SEGMENTS = 80;
  const spine = [];
  let phase = 0;

  function getSpine(time){
    const pts = [];
    for(let i=0;i<SEGMENTS;i++){
      const pct = i/(SEGMENTS-1);
      // S字うねり
      const wave1 = Math.sin(pct * Math.PI * 2.5 + time * 0.9) * 0.18;
      const wave2 = Math.sin(pct * Math.PI * 1.2 - time * 0.5) * 0.08;
      // 画面を大きく横断
      const x = W * (0.08 + pct * 0.84);
      const y = H * (0.25 + 0.55 * pct + wave1 + wave2);
      pts.push({x, y});
    }
    return pts;
  }

  function drawDragon(time){
    const pts = getSpine(time);

    // ---- 胴体グロー（外側から内側へ） ----
    for(let pass = 0; pass < 3; pass++){
      const blur  = [28, 14, 6][pass];
      const alpha = [0.012, 0.025, 0.06][pass];
      const w     = [18,  10,  4][pass];

      ctx.save();
      ctx.filter = `blur(${blur}px)`;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for(let i=1;i<pts.length;i++){
        const prev = pts[i-1], cur = pts[i];
        const mx = (prev.x + cur.x)/2, my = (prev.y + cur.y)/2;
        ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
      }
      const grad = ctx.createLinearGradient(pts[0].x, pts[0].y, pts[pts.length-1].x, pts[pts.length-1].y);
      grad.addColorStop(0,   `rgba(200,80,20,${alpha})`);
      grad.addColorStop(0.3, `rgba(200,148,42,${alpha*2})`);
      grad.addColorStop(0.6, `rgba(180,60,20,${alpha*1.5})`);
      grad.addColorStop(1,   `rgba(100,20,10,${alpha})`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = w;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
      ctx.restore();
    }

    // ---- 鱗（菱形を等間隔に配置） ----
    for(let i=4; i<pts.length-4; i+=5){
      const p = pts[i];
      const prev = pts[Math.max(0,i-1)], next = pts[Math.min(pts.length-1,i+1)];
      const ang = Math.atan2(next.y - prev.y, next.x - prev.x);
      const pulse = 0.7 + 0.3 * Math.sin(time*1.5 + i*0.2);
      const sz = (3 + (i/pts.length)*1.5) * pulse;

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(ang);
      ctx.beginPath();
      ctx.moveTo(0, -sz);
      ctx.lineTo(sz*0.6, 0);
      ctx.lineTo(0, sz);
      ctx.lineTo(-sz*0.6, 0);
      ctx.closePath();
      const a = 0.08 + 0.06 * pulse;
      ctx.fillStyle   = `rgba(200,148,42,${a})`;
      ctx.strokeStyle = `rgba(240,192,80,${a*1.5})`;
      ctx.lineWidth   = 0.4;
      ctx.fill(); ctx.stroke();
      ctx.restore();
    }

    // ---- 頭部 ----
    const head = pts[0];
    const headNext = pts[2];
    const headAng = Math.atan2(headNext.y - head.y, headNext.x - head.x) + Math.PI;

    // 頭の光輪
    const headGlow = ctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, 50);
    headGlow.addColorStop(0,   'rgba(240,180,60,0.18)');
    headGlow.addColorStop(0.5, 'rgba(180,60,20,0.08)');
    headGlow.addColorStop(1,   'transparent');
    ctx.save();
    ctx.filter = 'blur(8px)';
    ctx.fillStyle = headGlow;
    ctx.beginPath();
    ctx.arc(head.x, head.y, 50, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // 角（2本）
    ctx.save();
    ctx.translate(head.x, head.y);
    ctx.rotate(headAng);
    for(let s of [-1,1]){
      ctx.save();
      ctx.rotate(s * 0.3);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(s*8, -20, s*5, -36);
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = 'rgba(200,148,42,0.35)';
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();

    // 眼
    const eyeOffset = 8;
    for(let s of [-1,1]){
      const ex = head.x + Math.cos(headAng + Math.PI/2)*s*eyeOffset;
      const ey = head.y + Math.sin(headAng + Math.PI/2)*s*eyeOffset;
      const pulse2 = 0.6 + 0.4*Math.sin(time*2 + s);
      ctx.save();
      ctx.filter = `blur(2px)`;
      ctx.beginPath();
      ctx.arc(ex, ey, 5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(240,180,40,${0.5*pulse2})`;
      ctx.fill();
      ctx.restore();
      ctx.beginPath();
      ctx.arc(ex, ey, 2.5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,220,60,${0.8*pulse2})`;
      ctx.fill();
    }

    // ---- 尾部のスパーク ----
    const tail = pts[pts.length-1];
    if(Math.random() < 0.3){
      const sx = tail.x + (Math.random()-0.5)*20;
      const sy = tail.y + (Math.random()-0.5)*20;
      ctx.save();
      ctx.filter = 'blur(3px)';
      ctx.beginPath();
      ctx.arc(sx, sy, Math.random()*3+1, 0, Math.PI*2);
      ctx.fillStyle = `rgba(240,200,60,${Math.random()*0.4})`;
      ctx.fill();
      ctx.restore();
    }

    // ---- 背景の霧 ----
    const fogGrad = ctx.createRadialGradient(W*0.5, H*0.3, 0, W*0.5, H*0.3, W*0.8);
    fogGrad.addColorStop(0,   'rgba(40,15,5,0)');
    fogGrad.addColorStop(0.5, 'rgba(20,8,2,0.04)');
    fogGrad.addColorStop(1,   'rgba(10,4,0,0.12)');
    ctx.fillStyle = fogGrad;
    ctx.fillRect(0,0,W,H);
  }

  // 浮遊する火の粉
  const embers = Array.from({length:25},()=>({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    r: Math.random()*2+0.5,
    vx:(Math.random()-.5)*0.4,
    vy:-Math.random()*0.5-0.2,
    a: Math.random()*0.6+0.1,
    life: Math.random(),
  }));

  function drawEmbers(){
    embers.forEach(e=>{
      e.x += e.vx; e.y += e.vy; e.life += 0.005;
      if(e.y < -10 || e.life > 1){ e.y=H+10; e.x=Math.random()*W; e.life=0; }
      const a = e.a * Math.sin(e.life * Math.PI);
      ctx.save();
      ctx.filter='blur(1px)';
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
      ctx.fillStyle=`rgba(230,160,30,${a})`;
      ctx.fill();
      ctx.restore();
    });
  }

  function loop(){
    ctx.clearRect(0,0,W,H);
    // 暗い背景グラデ
    const bg = ctx.createRadialGradient(W*.4,H*.3,0, W*.5,H*.5, W*.9);
    bg.addColorStop(0, '#12080e');
    bg.addColorStop(1, '#09080d');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    t += 0.012;
    drawDragon(t);
    drawEmbers();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>

<!-- ========= DIVINATION SCRIPT ========= -->
<script>
const AURA = {
  '深紅': { en:'Deep Crimson', bg:'radial-gradient(circle, #6b0000 0%, #2a0000 100%)', glow:'rgba(180,20,20,.5)', icon:'🔴' },
  '藍':   { en:'Indigo',       bg:'radial-gradient(circle, #102060 0%, #050e30 100%)', glow:'rgba(20,60,180,.5)', icon:'💙' },
  '翡翠': { en:'Jade',         bg:'radial-gradient(circle, #0e5c30 0%, #042010 100%)', glow:'rgba(20,160,70,.5)', icon:'💚' },
  '金':   { en:'Gold',         bg:'radial-gradient(circle, #a07818 0%, #4a3208 100%)', glow:'rgba(200,148,42,.6)', icon:'✨' },
  '白銀': { en:'Silver',       bg:'radial-gradient(circle, #909090 0%, #404040 100%)', glow:'rgba(180,180,200,.5)', icon:'🤍' },
  '紫':   { en:'Violet',       bg:'radial-gradient(circle, #440e70 0%, #1c0435 100%)', glow:'rgba(120,30,200,.5)', icon:'💜' },
  '桃':   { en:'Rose',         bg:'radial-gradient(circle, #9c3858 0%, #4a1228 100%)', glow:'rgba(200,60,100,.5)', icon:'🌸' },
  '橙':   { en:'Amber',        bg:'radial-gradient(circle, #9c5810 0%, #4a2004 100%)', glow:'rgba(200,100,20,.5)', icon:'🔶' },
};

async function startDivination(){
  const name    = document.getElementById('nameInput').value.trim();
  const birth   = document.getElementById('birthInput').value;
  const concern = document.getElementById('concernInput').value.trim();
  if(!name||!birth){ alert('御名前と生年月日を入力してください'); return; }

  document.getElementById('formSection').style.display='none';
  document.getElementById('loadingSection').classList.add('on');

  const colorKeys = Object.keys(AURA);
  const prompt = `あなたは龍神に仕える霊視師です。以下の方のオーラカラー霊視鑑定をしてください。

御名前：${name}
生年月日：${birth}
心の想い：${concern||'なし'}

以下のJSONのみで返答（前後の説明・マークダウン不要）：
{"color":"色名","message":"鑑定文（220〜280文字・改行2〜3箇所）"}

色の選択肢：${colorKeys.join('、')}

口調：龍神の神託を伝える巫女のような、荘厳で神秘的な語り口。「〜でございます」「〜でありましょう」調。オーラの色の霊的意味・現在の魂の状態・龍神からの言伝を含めること。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    const text = data.content.map(i=>i.text||'').join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    showResult(parsed.color, parsed.message);
  } catch(e) {
    const fallback = colorKeys[Math.floor(Math.random()*colorKeys.length)];
    showResult(fallback,
      `${name}様の御魂には、${fallback}の神聖なるオーラが宿っておりまする。\n\n龍神の眼には、あなたの魂が今まさに大きな転換の時を迎えているのが映っております。\n\n恐れることなく、御自身の内なる声に従われませ。龍神はあなたの歩む道を静かに照らしてくださっておりますゆえ。`);
  }
}

function showResult(colorKey, message){
  document.getElementById('loadingSection').classList.remove('on');
  const aura = AURA[colorKey] || AURA['金'];
  const orb = document.getElementById('auraOrb');
  orb.style.background = aura.bg;
  orb.style.setProperty('--orb-glow', aura.glow);
  document.getElementById('orbIcon').textContent = aura.icon;
  document.getElementById('colorName').textContent = `◈ ${colorKey} ◈`;
  document.getElementById('colorEn').textContent = aura.en;
  document.getElementById('resultMsg').textContent = message;
  document.getElementById('resultSection').classList.add('on');
}

function reset(){
  document.getElementById('resultSection').classList.remove('on');
  document.getElementById('formSection').style.display='block';
  document.getElementById('nameInput').value='';
  document.getElementById('birthInput').value='';
  document.getElementById('concernInput').value='';
}
</script>
</body>
